<!DOCTYPE html>
<html>
<body>

<h3>Mensagem do WhatsApp</h3>

<textarea id="mensagem" placeholder="Digite a mensagem"></textarea>

<button onclick="salvar()">Salvar</button>

<script>
  let mensagem = "";

  // avisa que carregou (remove loading)
  window.parent.postMessage(
    JSON.stringify({ method: "ready" }),
    "*"
  );

  function salvar() {
    mensagem = document.getElementById("mensagem").value;

    window.parent.postMessage(
      JSON.stringify({
        method: "updateActivity",
        activity: {
          arguments: {
            execute: {
              inArguments: [
                {
                  mensagem: mensagem
                }
              ]
            }
          }
        }
      }),
      "*"
    );
  }
</script>

</body>
</html>
