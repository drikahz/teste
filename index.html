<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script src="https://unpkg.com/postmonger"></script>
</head>
<body>

<h3>Mensagem do WhatsApp</h3>

<textarea id="mensagem" style="width:100%; height:100px;"></textarea>
<br><br>

<input id="emailPath" placeholder="Ex: Event.DEAudience-1.email">
<br><br>
<input id="celularPath" placeholder="Ex: Event.DEAudience-1.celular">

<script>
  const connection = new Postmonger.Session();
  let activity = {};

  // 🔹 INIT (carrega dados)
  connection.on('initActivity', function(data) {
    try {
      activity = data || {};

      const inArgs = activity?.arguments?.execute?.inArguments || [];
      const args = inArgs[0] || {};

      document.getElementById("mensagem").value = args.mensagem || "";

      if (args.email) {
        document.getElementById("emailPath").value = args.email.replace(/[{}]/g, "");
      }

      if (args.celular) {
        document.getElementById("celularPath").value = args.celular.replace(/[{}]/g, "");
      }

      // ✅ botão só aqui (CRÍTICO)
      connection.trigger('updateButton', {
        button: 'next',
        text: 'Concluído',
        visible: true,
        enabled: true
      });

    } catch (e) {
      console.error("Erro no initActivity:", e);
    }
  });

  // 🔹 HANDSHAKE (obrigatório)
  connection.on('requestedTokens', function() {});
  connection.on('requestedEndpoints', function() {});

  connection.trigger('ready');
  connection.trigger('requestTokens');
  connection.trigger('requestEndpoints');

  // 🔹 CLICK NO CONCLUÍDO
  connection.on('clickedNext', function() {
    salvar();
  });

  // 🔹 SALVAR CONFIG
  function salvar() {
    try {
      const mensagem = document.getElementById("mensagem").value;
      const emailPath = document.getElementById("emailPath").value;
      const celularPath = document.getElementById("celularPath").value;

      const email = emailPath ? `{{${emailPath}}}` : "";
      const celular = celularPath ? `{{${celularPath}}}` : "";

      activity.arguments = activity.arguments || {};
      activity.arguments.execute = activity.arguments.execute || {};

      activity.arguments.execute.inArguments = [
        {
          mensagem: mensagem,
          email: email,
          celular: celular
        }
      ];

      activity.metaData = activity.metaData || {};
      activity.metaData.isConfigured = true;

      console.log("SALVANDO:", activity);

      connection.trigger('updateActivity', activity);

      // ✅ ESSENCIAL pra fechar modal
      connection.trigger('nextStep');

    } catch (e) {
      console.error("Erro ao salvar:", e);
    }
  }
</script>

</body>
</html>
